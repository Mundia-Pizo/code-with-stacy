{%extends 'accounts/base.html'%}
{%block content%}
<form action="{%url 'payment'%}" method="POST" enctype="multipart/form-data">
    <div class="pay-form">
        {%csrf_token%}
        <label for="">Card Number</label>
        {{form.cardno}}
        <input type="hidden" name="{{user.userName}}">
        <input type='submit' value='submit'>
    </div>
</form>
{%endblock content%}
