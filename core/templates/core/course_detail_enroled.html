{%extends 'accounts/base.html'%}
{%load static %}
{%block content%}
<section class="content-decoration">
    <div class="container">
    
    <div>
        <div class="course-list lessons">
            {%for lesson in object.lessons%}
            <div class="card">
                <a href="{{lesson.get_absolute_url}}">
                    <img src="{{lesson.image.url}}" alt="">
                    <p>{{lesson.description}}</p>
                </a>
            </div>
            {%empty%}
                <h1>Lessons to be published soon!!! please check again next time</h1>
            {%endfor%}
        </div>
    </div>
     
    </div>
</section>
{%endblock content%}
