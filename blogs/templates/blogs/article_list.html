{%extends 'core/layout.html'%}
{%block content%}
    <section class="container body">
        {%for blog in object_list%}
        <div class="blog">
            <h1>{{blog.title}}</h1>
            <p>{{blog.body|safe}}</p>
        </div>
        {%empty%}
        <h3>No articles available</h3>
        {%endfor%}         
    </section>
{%endblock content%}
